name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage -- tests/unit/
        env:
          NODE_ENV: test
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          TIMEZONE: Asia/Taipei

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  deploy:
    name: Deploy to Zeabur
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Zeabur deployment
        run: |
          curl -s -X POST "${{ secrets.ZEABUR_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref": "main"}' \
            -f || { echo "❌ Zeabur webhook 觸發失敗"; exit 1; }
          echo "✅ Zeabur 部署已觸發"

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.HEALTH_CHECK_URL }}" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ 健康檢查失敗 (HTTP $STATUS)，部署可能仍在進行中"
          else
            echo "✅ 健康檢查通過"
          fi
